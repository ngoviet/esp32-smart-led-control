# ===========================================
# SECRETS TEMPLATE - MẪU FILE BẢO MẬT  
# ===========================================
# 📝 Copy file này thành 'secrets.yaml' và điền thông tin thực
# 🔒 File 'secrets.yaml' sẽ được .gitignore, không upload lên GitHub
# ===========================================

# Device Configuration
device_name: "led_temp_pressure"

# OTA Password - Mật khẩu cập nhật firmware OTA
ota_password: "YOUR_SECURE_OTA_PASSWORD"

# WiFi Configuration - Cấu hình WiFi chính
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"
wifi_bssid: "aa:bb:cc:dd:ee:ff"  # Optional: MAC address router
wifi_channel: "11"               # Optional: WiFi channel

# Alternative WiFi networks (uncomment if needed)
# wifi_ssid_2: "BACKUP_WIFI"
# wifi_password_2: "BACKUP_PASSWORD"

# API Encryption Key (Optional) - Mã hóa API ESPHome 
# Tạo bằng lệnh: esphome generate-key
# api_encryption_key: "your_32_character_base64_key_here="

# ===========================================
# 📋 EXAMPLES - VÍ DỤ CẤU HÌNH:
# ===========================================
#
# 🏠 HOME WIFI:
# wifi_ssid: "MyHome_WiFi"
# wifi_password: "MySecurePassword123"
# wifi_bssid: "a8:bd:27:45:b0:02"
# wifi_channel: "6"
#
# 🏢 OFFICE WIFI:  
# wifi_ssid: "Office_Network"
# wifi_password: "OfficePass2024"
#
# 📱 MOBILE HOTSPOT:
# wifi_ssid: "iPhone_Hotspot"  
# wifi_password: "hotspot123"
#
# ===========================================
# 🔧 HƯỚNG DẪN SỬ DỤNG:
# ===========================================
# 1. Copy file này thành 'secrets.yaml':
#    Windows: copy secrets.template.yaml secrets.yaml
#    Linux/Mac: cp secrets.template.yaml secrets.yaml
#
# 2. Chỉnh sửa secrets.yaml với thông tin thực:
#    - Thay YOUR_WIFI_SSID bằng tên WiFi thật
#    - Thay YOUR_WIFI_PASSWORD bằng password WiFi  
#    - Thay YOUR_SECURE_OTA_PASSWORD bằng password OTA
#    - Optional: điền BSSID và channel
#
# 3. Kiểm tra .gitignore đã có 'secrets.yaml'
#
# 4. Build và deploy:
#    build_modular.bat
#    hoặc: esphome compile main.yaml
#
# 5. Upload lên GitHub an toàn:
#    git add .
#    git commit -m "Add modular structure"  
#    gh repo create esp32-led-controller --public
#    git push origin main
# ===========================================