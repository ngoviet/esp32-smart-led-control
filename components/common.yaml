# ===========================================
# CẤU HÌNH CƠ BẢN - COMMON CONFIGURATION  
# ===========================================

esphome:
  name: led_temp_pressure
  # platformio_options:
  #   board_build.f_cpu: 160000000L   # giữ mặc định, tránh OC gây treo Wi-Fi

esp32:
  board: esp32dev
  framework:
    type: esp-idf

web_server:
  port: 80

# WiFi configuration moved to main.yaml for security
# See main.yaml and secrets.yaml for WiFi settings

logger:
  baud_rate: 115200
  level: DEBUG

api:
  reboot_timeout: 0s                    # đứt API tạm thời không bị ép reboot
  
# OTA configuration moved to main.yaml for security
# See main.yaml and secrets.yaml for OTA password

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

# Nút restart thủ công (tiện khi HA vẫn còn API)
button:
  - platform: restart
    id: restart_button
    name: "Restart thiết bị"

# Tự phục hồi nếu Wi-Fi xuống kéo dài (bổ sung ngoài reboot_timeout)
interval:
  - interval: 2min
    then:
      - if:
          condition: wifi.connected
          then: []
          else:
            - logger.log: "WiFi down >2min → restarting device…"
            - button.press: restart_button